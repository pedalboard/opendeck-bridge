name: Build

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: yarn
          cache-dependency-path: OpenDeckUI/yarn.lock

      - name: Install ALSA dev headers
        run: sudo apt-get install -y libasound2-dev

      - name: Build UI
        run: make ui

      - name: Build bridge
        run: go build -o opendeck-bridge .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opendeck-bridge-arm64
          path: opendeck-bridge
