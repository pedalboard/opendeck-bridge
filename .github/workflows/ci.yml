name: CI

on: [push]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: gofmt -l . | grep . && exit 1 || true
      - run: go vet ./...
      - run: go build -o pedalboard-bridge .
      - uses: actions/upload-artifact@v4
        with:
          name: pedalboard-bridge
          path: pedalboard-bridge

  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: GOOS=linux GOARCH=arm64 go build -o pedalboard-bridge-arm64 .
      - uses: actions/upload-artifact@v4
        with:
          name: pedalboard-bridge-arm64
          path: pedalboard-bridge-arm64
